<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .opt-letter { font-weight: 700; min-width: 20px; font-size: 13px; }
  .sa-box { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 12px 16px; font-size: 14px; font-family: inherit; color: #1a1a2e; resize: vertical; min-height: 90px; outline: none; transition: border-color 0.2s; line-height: 1.6; }
  .sa-box:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
  .sa-box:disabled { background: #f9fafb; color: #4b5563; }

  .feedback-box.show { display: block; }
  .feedback-box.fb-correct { background: #f0fdf4; border: 1.5px solid #86efac; color: #14532d; }
  .feedback-box.fb-wrong { background: #fef2f2; border: 1.5px solid #fca5a5; color: #7f1d1d; }
  .feedback-box.fb-partial { background: #fffbeb; border: 1.5px solid #fcd34d; color: #78350f; }
  .feedback-box .model-ans { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.08); font-style: italic; }
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; padding: 14px 24px; display: flex; gap: 12px; justify-content: center; box-shadow: 0 -4px 16px rgba(0,0,0,0.08); }
  .btn { padding: 11px 28px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
  .btn-primary { background: #1a1a2e; color: white; }
  .btn-primary:hover { background: #2d2d4e; transform: translateY(-1px); }
  .btn-secondary { background: #f3f4f6; color: #374151; border: 1.5px solid #e5e7eb; }
  .btn-secondary:hover { background: #e5e7eb; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
  .results-screen { display: none; }
  .results-screen.show { display: block; }
  .score-hero { background: #1a1a2e; color: white; border-radius: 18px; padding: 36px; text-align: center; margin-bottom: 24px; }
  .score-pct { font-size: 72px; font-weight: 700; background: linear-gradient(135deg, #4ade80, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .score-label { font-size: 16px; color: rgba(255,255,255,0.7); margin-top: 4px; }
  .score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 24px; }
  .score-cell { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; }
  .score-cell .val { font-size: 28px; font-weight: 700; }
  .score-cell .lbl { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .val-correct { color: #4ade80; }
  .val-partial { color: #fbbf24; }
  .val-wrong { color: #f87171; }
  .pool-info { text-align: center; font-size: 13px; color: #6b7280; margin-bottom: 20px; }
  .review-section h3 { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
  .review-item { background: white; border-radius: 12px; padding: 16px; margin-bottom: 10px; border-left: 4px solid #e5e7eb; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .review-item.ri-correct { border-left-color: #22c55e; }
  .review-item.ri-partial { border-left-color: #f59e0b; }
  .review-item.ri-wrong { border-left-color: #ef4444; }
  .ri-q { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
  .ri-detail { font-size: 13px; color: #6b7280; margin-top: 4px; line-height: 1.5; }
  .ri-correct-ans { color: #15803d; font-weight: 500; }
  .ri-exp { margin-top: 6px; font-style: italic; color: #4b5563; border-top: 1px solid #f3f4f6; padding-top: 6px; }
  .start-screen { text-align: center; padding: 60px 20px; }
  .start-screen h2 { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }
  .start-screen p { font-size: 15px; color: #6b7280; margin-bottom: 8px; }
  .start-screen .warn { background: #fef3c7; border: 1.5px solid #fcd34d; border-radius: 10px; padding: 14px 20px; margin: 20px auto; max-width: 460px; font-size: 14px; color: #92400e; text-align: left; }
</style>
</head>

<div id="app"></div>

<script>
const ALL_QUESTIONS = [
  {type:"mc",q:"What does ESD stand for and why is it important when working on computers?",opts:["Electrostatic Discharge — can permanently damage computer components","Electronic System Diagnosis — used to test parts","External Storage Device — used to back up data","Electrical Short Detection — detects power surges"],ans:0,exp:"ESD (Electrostatic Discharge) can instantly destroy chips and components. Always use an ESD strap when working inside a computer."},
  {type:"mc",q:"Which connector provides the primary power to an ATX motherboard?",opts:["6-pin PCIe connector","4-pin auxiliary connector","24-pin (or 20+4-pin) P1 connector","SATA power connector"],ans:2,exp:"The 24-pin P1 connector is the main power connector for ATX motherboards."},
  {type:"mc",q:"What is the purpose of the POST process?",opts:["To install the operating system","A series of tests performed by BIOS/UEFI at startup to check hardware","To format the hard drive before use","To connect to a network at boot"],ans:1,exp:"POST (Power-On Self Test) runs hardware checks every time the computer starts. If something fails, it reports error or beep codes."},
  {type:"mc",q:"What is the key difference between DDR4 and DDR3 RAM?",opts:["DDR4 uses 240 pins; DDR3 uses 288 pins","DDR4 is faster, uses less power, and uses 288 pins vs DDR3's 240 pins","DDR4 only works with AMD processors","DDR4 uses triple channels while DDR3 uses dual channels"],ans:1,exp:"DDR4 is faster, uses less power, and has 288 pins. DDR3 has 240 pins. They are not physically compatible."},
  {type:"mc",q:"What does RAID 1 do?",opts:["Stripes data across drives for speed with no redundancy","Duplicates data on one drive to another for fault tolerance","Uses parity checking across three or more drives","Combines RAID 0 and RAID 1 requiring at least 4 disks"],ans:1,exp:"RAID 1 mirrors data — it writes identical data to two drives. If one fails, the other still has all your data."},
  {type:"mc",q:"Which form factor is used for RAM in laptops?",opts:["DIMM","SO-DIMM","RDIMM","ECC DIMM"],ans:1,exp:"SO-DIMM (Small Outline DIMM) is the smaller form factor used in laptops."},
  {type:"mc",q:"What does NVMe stand for and what interface does it use?",opts:["Non-Volatile Memory Express; uses PCIe","New Virtual Memory Express; uses SATA","Network Volume Memory Exchange; uses USB","Non-Volatile Media Extension; uses IDE"],ans:0,exp:"NVMe (Non-Volatile Memory Express) uses PCIe — up to 32 Gb/sec on PCIe 4.0, far faster than SATA's 6 Gb/sec."},
  {type:"mc",q:"What is the purpose of thermal compound?",opts:["To lubricate the CPU fan","To fill the gap between the processor and cooler to transfer heat","To insulate the CPU from the motherboard","To act as an electrical conductor between the CPU and socket"],ans:1,exp:"Thermal compound fills microscopic air gaps between the CPU and heat sink, dramatically improving heat transfer."},
  {type:"mc",q:"How does UEFI differ from traditional BIOS?",opts:["UEFI can only be used with AMD processors","UEFI supports drives larger than 2TB, Secure Boot, and is required for Windows 10 certification","UEFI does not support legacy devices","UEFI uses a 16-bit interface while BIOS uses 32-bit"],ans:1,exp:"UEFI improves on BIOS with support for drives over 2TB, Secure Boot, and is required for Windows 10/11 certification."},
  {type:"mc",q:"What is the maximum number of USB devices that can be daisy-chained together?",opts:["64","16","127","255"],ans:2,exp:"USB supports up to 127 devices connected in a chain."},
  {type:"mc",q:"What does S.M.A.R.T. technology do?",opts:["Monitors drive health and predicts when a drive is likely to fail","Speeds up drive read/write operations","Encrypts data on the hard drive","Manages RAID array configuration"],ans:0,exp:"S.M.A.R.T. monitors drive health indicators and warns you before a drive fails so you can back up data in time."},
  {type:"mc",q:"Which PCIe slot size is typically used for graphics cards?",opts:["PCIe x1","PCIe x4","PCIe x8","PCIe x16"],ans:3,exp:"PCIe x16 has 16 lanes and is used for graphics cards that need maximum data throughput."},
  {type:"mc",q:"What is the correct order to install components when reassembling a desktop?",opts:["Motherboard, power supply, drives, cards","Cards, drives, motherboard, power supply","Power supply, drives, motherboard, cards","Drives, power supply, cards, motherboard"],ans:2,exp:"The correct order: power supply first, then drives, then motherboard, then expansion cards."},
  {type:"mc",q:"What does ECC RAM do?",opts:["Increases RAM speed by 50%","Detects and corrects single-bit memory errors; detects (but cannot correct) 2-bit errors","Allows RAM to run without a memory controller","Enables quad-channel memory access"],ans:1,exp:"ECC (Error-Correcting Code) RAM detects and fixes single-bit errors and detects (but can't fix) two-bit errors. Used in servers for reliability."},
  {type:"mc",q:"What is the purpose of a loopback plug?",opts:["To connect two computers directly","To test a network port to verify it is working correctly","To block unused ports for security","To boost a network signal"],ans:1,exp:"A loopback plug tests a port by routing its signal back through itself, confirming it can send and receive."},
  {type:"mc",q:"What does dual-channel memory do?",opts:["Doubles the number of DIMMs you can install","Allows the memory controller to access two DIMMs simultaneously, doubling memory bandwidth","Enables two different types of RAM to work together","Splits each DIMM into two virtual modules"],ans:1,exp:"Dual-channel lets the memory controller access two DIMMs at once, effectively doubling the memory bus bandwidth."},
  {type:"mc",q:"What is the SATA 3 data transfer speed?",opts:["3 Gb/sec","6 Gb/sec","12 Gb/sec","32 Gb/sec"],ans:1,exp:"SATA Revision 3.x transfers data at 6 Gb/sec. NVMe via PCIe 4.0 reaches 32 Gb/sec."},
  {type:"mc",q:"What does RAID 0 do?",opts:["Mirrors data on two drives","Stripes data evenly across all disks for performance — no redundancy","Uses parity for fault tolerance","Requires a minimum of 4 disks"],ans:1,exp:"RAID 0 stripes data across multiple disks for better performance but provides NO fault tolerance. One drive fails, all data is lost."},
  {type:"mc",q:"What is the function of the TPM chip?",opts:["Controls processor speed","Stores the BitLocker encryption startup key so a drive can't be used in another computer","Manages RAM timing","Controls USB power sharing"],ans:1,exp:"The TPM (Trusted Platform Module) chip stores encryption keys. BitLocker uses it to tie drive encryption to a specific machine."},
  {type:"mc",q:"Which component draws the most power in a typical computer?",opts:["Processor","RAM modules","The video/graphics card","Hard drives"],ans:2,exp:"Video cards draw the most power, which is why they often need dedicated PCIe power connectors and higher-wattage power supplies."},
  {type:"mc",q:"What is overclocking?",opts:["Running a component at a lower speed to save power","Running a processor, memory, or video card faster than the manufacturer recommends","Updating the BIOS firmware","Installing a faster cooling system"],ans:1,exp:"Overclocking pushes a component beyond its rated speed for more performance, but risks instability and overheating."},
  {type:"mc",q:"What does Secure Boot do?",opts:["Encrypts all data at rest on the hard drive","Prevents a system from booting with unsigned or untrusted drivers/OS","Locks the BIOS with a password","Disables USB ports during boot"],ans:1,exp:"Secure Boot prevents malware from running before the OS loads by verifying digital signatures of drivers and the OS."},
  {type:"mc",q:"What is a docking station used for?",opts:["To charge only the laptop battery","To allow a laptop to connect to a full-sized monitor, keyboard, and other peripherals via one connector","To upgrade laptop RAM","To run laptop diagnostics"],ans:1,exp:"A docking station connects via the laptop's docking port and gives easy access to full-size peripherals like monitors, keyboards, and Ethernet."},
  {type:"mc",q:"What does the microATX form factor change vs standard ATX?",opts:["It uses a 20-pin P1 connector","It reduces expansion slots and power, and allows a smaller case; still uses a 24-pin P1 connector","It eliminates all expansion slots","It uses a different CPU socket"],ans:1,exp:"MicroATX reduces expansion slots and power delivery, allowing a smaller and cheaper case, but still uses the 24-pin P1 connector."},
  {type:"mc",q:"What does the PC rating of RAM measure?",opts:["The physical size of the module","The total bandwidth (MB/sec) of data moving between the module and CPU","The latency in nanoseconds","The voltage the module requires"],ans:1,exp:"The PC rating (e.g., PC4-24000) measures total bandwidth. For DDR4: multiply MHz speed by 8 bytes to get MB/sec."},
  {type:"mc",q:"What interface does an M.2 slot support?",opts:["IDE only","PCIe, SATA, or USB depending on the slot","USB 3.0 only","eSATA only"],ans:1,exp:"M.2 is flexible — depending on the slot, it can use PCIe (NVMe), SATA, or USB interfaces."},
  {type:"mc",q:"What does RAID 5 do?",opts:["Pure mirroring of two drives","Stripes data with parity across 3+ drives for fault tolerance without full duplication","Combines RAID 0 and RAID 1","Simple spanning of two drives"],ans:1,exp:"RAID 5 stripes data with parity across 3+ drives. One drive can fail and data is rebuilt from parity on the remaining drives."},
  {type:"mc",q:"When installing an Intel processor, what do you align?",opts:["The gold triangle on the CPU with the triangle on the socket","The two notches on the processor edge with the posts on the socket","The heat sink fins with the RAM slots","The CPU fan header with the 24-pin connector"],ans:1,exp:"Intel CPUs have two notches on their edges that align with posts on the socket to ensure correct, damage-free orientation."},
  {type:"mc",q:"What is CAS latency?",opts:["The maximum operating temperature of RAM","The number of clock cycles it takes to read or write a row of data from a memory module","The voltage required by a DIMM","The number of memory channels supported"],ans:1,exp:"CAS (Column Access Strobe) Latency measures memory timing — lower numbers mean faster response times."},
  {type:"mc",q:"What does hot-swapping mean?",opts:["Replacing a component while overclocked","Connecting or disconnecting a device while the system is running","Installing a component without an ESD strap","Running two power supplies simultaneously"],ans:1,exp:"Hot-swapping means you can connect/disconnect a device without powering down. SATA and USB both support hot-swapping."},
  {type:"mc",q:"What is the role of a chipset on a motherboard?",opts:["It provides the CPU's processing power","A set of chips working with the processor to control memory, buses, and peripherals","It stores the BIOS firmware","It regulates power supply voltage"],ans:1,exp:"The chipset manages communication between the CPU, RAM, expansion slots, and peripherals. Must be compatible with the processor."},
  {type:"mc",q:"Which best describes virtual memory?",opts:["RAM that operates faster than physical RAM","Space on the hard drive Windows uses to supplement RAM, stored in pagefile.sys","A second bank of RAM in a separate slot","RAM dedicated to the GPU"],ans:1,exp:"Virtual memory uses hard drive space (pagefile.sys) to extend available RAM. Low drive space = too small pagefile = low memory warnings."},
  {type:"mc",q:"What happens if you mix different RAM speeds in one system?",opts:["The system will not boot","All modules run at the speed of the fastest module","All modules run at the speed of the slowest module","The modules alternate between their individual speeds"],ans:2,exp:"When mixing RAM speeds, all modules default to the slowest speed present to maintain system stability."},
  {type:"mc",q:"What is the I/O shield on a motherboard?",opts:["Protects the CPU from overheating","A plate installed in the case providing holes for the motherboard's I/O ports","Grounds the motherboard to the case","Protects RAM from static electricity"],ans:1,exp:"The I/O shield is a metal plate at the back of the case with correctly shaped cutouts for all of the motherboard's rear ports."},
  {type:"mc",q:"What should you do first before working inside a computer?",opts:["Remove the RAM","Power down, unplug, and press the power button for 3 seconds to drain residual power","Remove the hard drive","Install the ESD strap while the system is on"],ans:1,exp:"Always power down, unplug all cables, then press/hold the power button ~3 seconds to fully discharge before touching internal components."},
  {type:"mc",q:"What is NAND flash memory used for in an SSD?",opts:["Volatile memory that loses data when powered off","Non-volatile storage with no moving parts","A type of RAM used for cache","Memory used only in USB drives"],ans:1,exp:"SSDs use NAND flash — non-volatile (keeps data without power) and has no moving parts, making SSDs faster and more reliable."},
  {type:"mc",q:"What does SATA stand for?",opts:["Serial Advanced Technology Attachment","Synchronous Addressable Transfer Array","Sequential Analog Transfer Architecture","Structured ATA"],ans:0,exp:"SATA = Serial Advanced Technology Attachment. It is the dominant storage interface for connecting drives to motherboards."},
  {type:"mc",q:"What is the recommended wattage buffer when sizing a power supply?",opts:["10% above expected needs","20% above expected needs","30% above expected needs","50% above expected needs"],ans:2,exp:"The PSU should be rated 30% higher than your calculated total wattage to ensure stability and allow for upgrades."},
  {type:"mc",q:"What does RAID 10 require and what does it do?",opts:["2 disks; stripes for speed","3 disks; parity for redundancy","At least 4 disks; mirrors pairs of disks while also striping","Any number of disks; simple spanning"],ans:2,exp:"RAID 10 = RAID 1 + RAID 0. Needs 4+ disks. Gives both speed (striping) and redundancy (mirroring)."},
  {type:"mc",q:"What does 'flashing the BIOS' mean?",opts:["Resetting BIOS to factory defaults","Updating the firmware stored on the BIOS/UEFI chip","Unlocking overclocking in BIOS","Encrypting BIOS settings"],ans:1,exp:"Flashing the BIOS updates the firmware program stored on the chip. Always follow manufacturer instructions carefully."},
  {type:"mc",q:"What does DDR stand for in DDR4 RAM?",opts:["Direct Data Relay","Double Data Rate","Dual Drive Register","Dynamic Data RAM"],ans:1,exp:"DDR = Double Data Rate. It transfers data on both the rising and falling edge of the clock cycle, doubling throughput."},
  {type:"mc",q:"What is the key advantage of an SSD over a magnetic HDD?",opts:["SSDs are cheaper per GB","SSDs have more moving parts","SSDs are faster, more reliable, use less power, and have no moving parts","SSDs can hold more data than any magnetic drive"],ans:2,exp:"SSDs win on speed, reliability, and power use due to having no moving parts. The downside: higher cost per GB."},
  {type:"mc",q:"What is the form factor for most desktop magnetic hard drives?",opts:["2.5\"","3.5\"","1.8\"","5.25\""],ans:1,exp:"Desktop magnetic drives use 3.5\" form factor. Laptops use 2.5\"."},
  {type:"mc",q:"What type of adapter feature allows it to work in both US and European outlets?",opts:["Voltage regulator","Auto-switching from 110V to 220V AC power","Built-in transformer","Dual-phase power circuit"],ans:1,exp:"Most laptop AC adapters auto-switch between 110V and 220V, making them compatible with outlets worldwide."},
  {type:"mc",q:"What is a POST diagnostic card used for?",opts:["Testing RAM speed","Discovering and reporting computer errors at POST when the system won't boot","Measuring power supply output","Flashing the BIOS firmware"],ans:1,exp:"A POST card is installed in an expansion slot and monitors the boot process, reporting error codes when the system fails to boot."},
  {type:"mc",q:"What does ARM stand for?",opts:["Advanced RISC Machine","Automated RAM Module","Advanced Register Memory","Accelerated RISC Microprocessor"],ans:0,exp:"ARM = Advanced RISC Machine. ARM processors are low-cost, low-power, low-heat — widely used in mobile devices."},
  {type:"mc",q:"Which Windows tool tests RAM for errors?",opts:["Device Manager","Disk Defragmenter","Memory Diagnostic Tool","Event Viewer"],ans:2,exp:"Windows Memory Diagnostic Tool checks your RAM for errors. Access it through Control Panel or the Start menu search."},
  {type:"mc",q:"What is the maximum RAM a 32-bit Windows 10 installation supports?",opts:["2 GB","4 GB","8 GB","16 GB"],ans:1,exp:"32-bit Windows can only address a maximum of 4 GB of RAM regardless of how much is physically installed."},
  {type:"mc",q:"What does a jumper on a motherboard do?",opts:["Connects the power LED to the motherboard","Holds configuration information using two small metal posts with or without a cover","Connects the CPU to the socket","Provides additional power to the GPU"],ans:1,exp:"Jumpers are small pins that store hardware configuration. They can be open (no cover) or closed (with a cover)."},
  {type:"mc",q:"What does IOPS measure?",opts:["Power supply efficiency","The number of read or write operations a storage device performs per second","Network throughput","CPU clock speed"],ans:1,exp:"IOPS (Input/Output Operations Per Second) measures how many individual read/write operations a storage device handles each second."},
  {type:"mc",q:"What does a Thunderbolt port support?",opts:["Only charging devices","Only video output","High-end displays, external storage, and device charging — a multipurpose connector","Only USB devices"],ans:2,exp:"Thunderbolt is a multipurpose high-speed connector supporting displays, fast external storage, and power delivery."},
  {type:"mc",q:"What file does Windows store virtual memory in?",opts:["swap.sys","virtual.dat","pagefile.sys","vmem.sys"],ans:2,exp:"Windows virtual memory is stored in pagefile.sys, a hidden file in the root of the C: drive."},
  {type:"mc",q:"What does DDR5 offer compared to DDR4?",opts:["Lower speed but higher capacity","Higher speed, lower power, and up to 64 Gb DRAM per module","Same speed but with ECC built in","Triple channels only"],ans:1,exp:"DDR5 is faster than DDR4, uses less power, and offers up to 64 Gb per module. It also uses 288 pins like DDR4."},
  {type:"mc",q:"What should you do if you smell burnt components?",opts:["Turn the system on briefly to identify the problem","Don't turn the system on — identify the fried component and replace it","Clean with compressed air and try again","Flash the BIOS to restore settings"],ans:1,exp:"Never power on a computer that smells burnt. Find and replace the damaged component first."},
  {type:"mc",q:"What is the typical symptom when power cords to the motherboard are not connected after reassembly?",opts:["System boots but has no audio","Memory errors during POST","System is completely dead — no lights, no sounds, nothing on screen","Keyboard doesn't work"],ans:2,exp:"No power to the motherboard = completely dead system. No fans, no lights, no sounds, no display at all."},
  {type:"mc",q:"Which of the following is NOT a symptom of a power supply problem?",opts:["Computer appears dead with no indicator lights","Computer sometimes locks up during booting","Monitor shows incorrect resolution","Burnt smell from the case"],ans:2,exp:"Incorrect resolution is a display/driver issue, not a PSU symptom. PSU problems show as dead systems, lockups, or burnt smells."},
  {type:"mc",q:"What is the eSATA cable's maximum recommended length?",opts:["18 inches","1 meter","2 meters","5 meters"],ans:2,exp:"External SATA (eSATA) uses a specially shielded cable with a maximum length of 2 meters."},
  {type:"mc",q:"What is a standoff in motherboard installation?",opts:["A type of memory module","A spacer that holds the motherboard away from the case to prevent electrical shorts","A type of expansion card","A jumper configuration"],ans:1,exp:"Standoffs are metal/plastic spacers that keep the motherboard from touching the case. Missing standoffs cause short circuits."},
  {type:"mc",q:"What is a redundant power supply (RPS)?",opts:["A power supply with extra wattage","Two identical power supplies so one can take over if the other fails","A power supply with dual voltage rails","A PSU with an external battery backup"],ans:1,exp:"A redundant power supply uses two identical PSUs. If one fails, the other takes over instantly — critical for servers."},
  {type:"mc",q:"What Windows tool helps optimize hard drive performance?",opts:["Device Manager","Defrag and Optimization tool (dfrgui.exe)","Event Viewer","Memory Diagnostic"],ans:1,exp:"The Windows Defrag and Optimization tool (dfrgui.exe) defragments HDDs and sends TRIM commands to SSDs."},
  {type:"mc",q:"Which of the following correctly describes the 4-pin auxiliary connector on an ATX power supply?",opts:["It is the main power connector for the motherboard","It provides an additional 12V of power specifically for the CPU","It powers SATA drives","It connects to the PCIe video card"],ans:1,exp:"The 4-pin (or 8-pin) auxiliary connector provides additional 12V power dedicated to the CPU, supporting higher-performance processors."},
  {type:"mc",q:"What does the 'x' in PCIe x4 refer to?",opts:["The version of PCIe","The physical length of the slot","The number of data lanes available","The maximum wattage the slot provides"],ans:2,exp:"The number after 'x' in PCIe indicates the number of data lanes. PCIe x4 = 4 lanes. More lanes = more bandwidth."},
  {type:"mc",q:"What is the purpose of installing a chassis air guide?",opts:["To hold the motherboard in place","To direct airflow specifically to the processor for better cooling","To mount additional hard drives","To organize cable management"],ans:1,exp:"A chassis air guide is a duct that directs cool air from outside the case directly to the processor, improving cooling efficiency."},
  {type:"mc",q:"What SD card standard uses SDXC?",opts:["SD 1.x","SD 2.x","SD 3.x","SD 7.x"],ans:2,exp:"SDXC (SD eXtended Capacity) is the SD 3.x standard. SD 1.x = regular SD, SD 2.x = SDHC, SD 7.x = SDUC."},
  {type:"mc",q:"What is the purpose of the front panel header on a motherboard?",opts:["To connect the power supply","To connect case buttons and LEDs (power, reset, HDD activity) to the motherboard","To connect drives","To connect the GPU to the CPU"],ans:1,exp:"The front panel header connects the case's power button, reset button, and indicator LEDs to the motherboard."},
  {type:"mc",q:"What causes a whining sound when you first power up a new system with a video card?",opts:["The RAM is not seated properly","The video card is not getting enough power — the PSU may be inadequate","The BIOS needs to be updated","The CPU cooler is not attached"],ans:1,exp:"A whine on first power-up with a new GPU usually means the power supply isn't delivering enough wattage for the video card."},
  {type:"mc",q:"To calculate the PC rating of a DDR4 DIMM running at 3,000 MHz, you multiply by what?",opts:["4 bytes","8 bytes","16 bytes","64 bytes"],ans:1,exp:"A DIMM has a 64-bit (8-byte) data path. PC rating = MHz × 8. So 3,000 MHz DDR4 = PC4-24000."},
  {type:"mc",q:"What is RAID 5's minimum drive requirement?",opts:["2 drives","3 drives","4 drives","5 drives"],ans:1,exp:"RAID 5 requires a minimum of 3 drives — data and parity are striped across all of them."},
  {type:"mc",q:"When removing an expansion card, what should you avoid touching?",opts:["The bracket at the top of the card","The edge connectors or chips on the card","The case screws","The power cable"],ans:1,exp:"Never touch the edge connectors or chips on an expansion card. Static electricity and oils from your fingers can damage them."},
  {type:"mc",q:"What does the Compatibility Support Module (CSM) in UEFI do?",opts:["Enables RAID support","Allows UEFI to boot from older MBR hard drives and provide BIOS-style boot","Enables USB power share when the PC is off","Controls Secure Boot settings"],ans:1,exp:"CSM (Compatibility Support Module) lets UEFI systems boot from older MBR-formatted drives and behave like a traditional BIOS when needed."},
  {type:"mc",q:"What is the purpose of the 6-pin and 8-pin PCIe connectors from the power supply?",opts:["They connect to SATA drives","They connect directly to the video card to provide extra power","They power the CPU","They connect to the front panel header"],ans:1,exp:"PCIe 6-pin and 8-pin connectors from the PSU plug directly into video cards to supply the extra power they need beyond what the slot provides."},
  {type:"mc",q:"If a laptop screen is black but the power light is on, and an external monitor works fine, what does this indicate?",opts:["The GPU is failed","The problem is with the LCD panel assembly — inverter or panel needs replacement","The RAM is faulty","The OS has crashed"],ans:1,exp:"If the external monitor works but the laptop screen is black, the problem is isolated to the LCD panel — likely the inverter or the panel itself needs replacing."},
  {type:"mc",q:"For quad-channel memory, how many DIMM slots does the motherboard typically have?",opts:["4","6","8","16"],ans:2,exp:"Quad-channel motherboards typically have 8 DIMM slots — 4 channels with 2 slots each. The CPU can address all 4 channels simultaneously."},

  {type:"sa",q:"Explain the difference between RAID 0 and RAID 1 in terms of performance and fault tolerance.",ans:"RAID 0 stripes data across multiple drives for better performance but has zero fault tolerance — losing one drive loses all data. RAID 1 mirrors data to two drives for fault tolerance (survives one drive failure) but doesn't improve performance and uses 50% of storage capacity for redundancy.",key:["RAID 0","stripes","performance","no fault tolerance","RAID 1","mirrors","fault tolerance","redundancy"]},
  {type:"sa",q:"What is ECC RAM and when would you use it?",ans:"ECC (Error-Correcting Code) RAM has an extra chip that detects and corrects single-bit memory errors, and detects (but can't fix) two-bit errors. The data path is 72 bits (64 + 8 for ECC). It's used in servers and workstations where data integrity is critical and errors cannot be tolerated.",key:["ECC","error-correcting","single-bit","server","72 bits","detect","correct"]},
  {type:"sa",q:"Describe the steps to safely open a desktop computer case and prepare to work inside.",ans:"Power down the system and unplug it. Press and hold the power button for 3 seconds to drain residual power. Put on your ESD strap and clip it to the case. Remove the case cover. Keep screws organized in a bag or cup. Draw diagrams of cable connections before removing anything.",key:["power down","unplug","power button","ESD strap","screws","diagram"]},
  {type:"sa",q:"What is the difference between SATA and NVMe in terms of speed and use case?",ans:"SATA 3 transfers data at 6 Gb/sec and is used by both HDDs and SSDs. NVMe uses PCIe — PCIe 3.0 at 8 Gb/sec, PCIe 4.0 at 32 Gb/sec. NVMe is used only by SSDs and is significantly faster, ideal for high-performance storage workloads.",key:["SATA","6 Gb","NVMe","PCIe","32 Gb","faster","SSD"]},
  {type:"sa",q:"Explain how dual-channel memory works and what is required to enable it.",ans:"Dual-channel allows the memory controller to communicate with two DIMMs simultaneously, doubling memory bandwidth. To enable it: the motherboard must support it, you need matching pairs of DIMMs (identical size, speed, and features), installed in the correct color-coded slots as per the motherboard manual.",key:["two DIMMs","simultaneously","matching","bandwidth","slots","color-coded","identical"]},
  {type:"sa",q:"What is Secure Boot and what problem does it solve?",ans:"Secure Boot is a UEFI feature that prevents the system from booting with unsigned or untrusted drivers and operating systems. It stops malware from launching before the OS and anti-malware software load. It works by checking digital signatures against a database stored in flash memory on the motherboard.",key:["UEFI","unsigned","malware","digital signatures","before OS","trusted","flash memory"]},
  {type:"sa",q:"Describe the purpose and function of the POST process.",ans:"POST (Power-On Self Test) is a series of hardware tests run by the BIOS/UEFI every time the computer boots. It checks key components like the CPU, RAM, and storage are working. If a problem is found, POST reports it via error codes, beep codes, or messages on screen before the OS loads.",key:["power-on self test","BIOS","UEFI","hardware","error","beep","boot","checks"]},
  {type:"sa",q:"What factors should you consider when calculating the required wattage of a power supply?",ans:"Add up the wattage requirements of all components in the case plus USB devices powered through the motherboard. Video cards draw the most power. The PSU should be rated 30% higher than the calculated total to ensure stability, efficiency, and headroom for future upgrades.",key:["wattage","components","video card","30%","higher","headroom","stability"]},
  {type:"sa",q:"Explain what happens to memory performance if you mix different RAM speeds in one system.",ans:"When different RAM speeds are mixed, all modules operate at the speed of the slowest module. You should also never mix buffered or registered memory with unbuffered memory — this simply will not work. Matching manufacturer is recommended when possible.",key:["slowest","all modules","same speed","match","unbuffered","buffered","registered"]},
  {type:"sa",q:"What is S.M.A.R.T. and how does it help with hard drive maintenance?",ans:"S.M.A.R.T. (Self-Monitoring Analysis and Reporting Technology) monitors drive health metrics like spin-up time, head-to-disk distance, and temperature. It predicts when a drive is likely to fail and displays a warning message so you can back up data before failure. It can be enabled or disabled in BIOS/UEFI.",key:["self-monitoring","predict failure","warning","BIOS","temperature","health","backup"]},
  {type:"sa",q:"What is the difference between a docking station and a port replicator?",ans:"A docking station connects via a proprietary docking port on the laptop and provides a full desktop setup (monitor, keyboard, Ethernet, etc.). A port replicator (also called a universal docking station) serves the same purpose but typically uses a standard connection like USB-C and works with various laptop models.",key:["docking port","peripheral","monitor","port replicator","universal","USB-C","proprietary"]},
  {type:"sa",q:"Describe the steps to install a DIMM module in a desktop.",ans:"Power down and unplug the system, press the power button to drain power, open the case, and wear an ESD strap. Pull out the supporting arms on both sides of the slot. Align the notch on the DIMM edge connector with the slot. Insert the DIMM straight down (not at an angle) until the supporting clips snap back into place. Verify the memory is recognized in BIOS/UEFI.",key:["ESD","supporting arms","notch","straight down","clips","BIOS","snap"]},
  {type:"sa",q:"Explain what overclocking is and why it is generally not recommended.",ans:"Overclocking is running a processor, memory, motherboard, or video card at a higher speed than the manufacturer recommends. While it can improve performance, it is not a recommended best practice because it can cause system instability, overheating, potential permanent damage, and may void the component warranty.",key:["higher speed","manufacturer","not recommended","instability","overheating","warranty","performance"]},
  {type:"sa",q:"What are the key things to check when a computer powers on but shows no image on the monitor?",ans:"Check the monitor power cable and that the monitor is on. Verify the video cable is connected to the correct port on the PC. Confirm the monitor's input source matches the connected port. Check for a conflict between the onboard video and a dedicated GPU — disable onboard video in BIOS. Try a different cable or monitor.",key:["monitor","power cable","video cable","port","onboard","conflict","input source","disable"]},
  {type:"sa",q:"What is virtual memory and what happens when there isn't enough space for it?",ans:"Virtual memory is how Windows uses hard drive space to supplement physical RAM. It is stored in pagefile.sys in the root of drive C:. If drive C: doesn't have enough free space, pagefile.sys becomes too small and Windows shows a 'low memory' warning, causing slowdowns and application failures.",key:["pagefile.sys","hard drive","supplement","RAM","low memory","drive C","slowdowns"]},
  {type:"sa",q:"Describe the general troubleshooting approach for a computer that won't boot.",ans:"Interview the user and back up data first. Examine the system and make an initial determination of the problem. Start with simple checks: power connections, cables, POST codes or beep codes. Test your theory. Check BIOS/UEFI settings, run the Memory Diagnostic Tool, check Event Viewer. Use a POST card for completely dead systems. Document everything.",key:["interview","back up","POST","cables","BIOS","memory diagnostic","document","simple","event viewer"]},
  {type:"sa",q:"What must be true for dual-channel memory to work properly?",ans:"The motherboard and DIMMs must both support dual-channel. The pair of DIMMs must be identical in size, speed, and features. They must be installed in the correct color-coded slot pairs as shown in the motherboard manual. Using the same manufacturer is recommended though not strictly required.",key:["motherboard","DIMMs","identical","size","speed","color-coded slots","manufacturer","matching"]},
  {type:"sa",q:"Explain the differences between DDR3, DDR4, and DDR5 RAM.",ans:"DDR3 uses 240 pins and supports dual and triple channels. DDR4 uses 288 pins, is faster and uses less power than DDR3, and supports dual and quad channels. DDR5 is faster than DDR4, uses less power, offers up to 64 Gb per module, and also uses 288 pins. None are physically compatible with each other due to different notch positions and pin counts.",key:["DDR3 240","DDR4 288","DDR5","faster","less power","64 Gb","not compatible","notch","quad channel"]},
  {type:"sa",q:"What is the purpose of applying thermal compound when installing a CPU cooler?",ans:"Thermal compound fills the microscopic air gaps and surface imperfections between the processor and the cooler's heat sink. Air is a very poor conductor of heat — thermal compound is much better, dramatically improving heat transfer from CPU to cooler. Never use thermal compound AND a thermal pad at the same time, and never stack thermal pads.",key:["air gaps","heat transfer","conduct","cooler","heat sink","not both","thermal pad","microscopic"]},
  {type:"sa",q:"Describe the key symptoms of a failing or overheating computer.",ans:"Overheating symptoms: system hangs or freezes at odd times, BSOD during boot, fans making whining sounds or not running, no airflow from vents. General hardware failure symptoms: system begins to boot then powers down, memory errors reported, components not working, intermittent Windows errors or hard drive errors.",key:["hangs","BSOD","fans","no airflow","powers down","memory errors","intermittent","freezes"]},
  {type:"sa",q:"What are the ATX power supply connector types and their purposes?",ans:"The 24-pin (or 20+4-pin) P1 connector is the main motherboard power connector. The 4-pin and 8-pin auxiliary connectors provide additional 12V power for the CPU. The 6-pin and 8-pin PCIe connectors power video cards directly. SATA power connectors power SATA drives. The 4-pin Molex connector is a legacy connector used by some older devices and fans.",key:["24-pin","P1","auxiliary","12V","CPU","PCIe","6-pin","8-pin","video card","SATA","Molex"]},
  {type:"sa",q:"Explain the RAID 5 setup process using three SATA drives.",ans:"Install the three drives and connect each to the motherboard. Boot and enter BIOS/UEFI — verify the drives are recognized, then set the SATA configuration to RAID. Reboot and enter BIOS again, go to the Intel Rapid Storage Technology page and select Create RAID Volume. Select RAID 5 (Parity), set the strip size and volume size, then select Create Volume to complete the configuration.",key:["three drives","BIOS","SATA","RAID","Intel Rapid Storage","Create RAID Volume","parity","strip size"]},
  {type:"sa",q:"What steps would you take to diagnose and fix a system that is overheating?",ans:"Go into BIOS/UEFI and check the CPU temperature monitor — it should not exceed the manufacturer's recommended maximum. Use compressed air to remove dust from the PSU and vents. Check that all fans are running. Install extra case fans if needed. Add a chassis air guide. Ensure the cooler is properly seated on the processor. Make sure the case has a few inches of clearance on sides and top. Check if the CPU is being overclocked.",key:["BIOS","temperature","compressed air","fans","cooler","clearance","overclocked","dust","chassis air guide"]},
  {type:"sa",q:"What is the difference between a magnetic hard drive and a solid-state drive (SSD)?",ans:"Magnetic hard drives use spinning platters with read/write heads controlled by an actuator. Data is organized in tracks divided into sectors. SSDs use NAND flash memory with no moving parts, making them faster, more reliable, and more power efficient. SSDs are measured by TBW (TeraBytes Written) or DWPD (Drive Writes Per Day) for lifespan. SSDs cost more per GB but are becoming standard.",key:["spinning platters","read/write heads","NAND flash","no moving parts","faster","reliable","TBW","DWPD","sectors","tracks"]},
  {type:"sa",q:"Explain the process and considerations for upgrading RAM in a laptop.",ans:"First check if the laptop is still under warranty before opening it, as opening may void it. Determine how much memory the laptop supports and what type (DDR4, DDR3L, or DDR3 SO-DIMM). Purchase matching compatible memory. Power down, remove AC adapter and battery. Access the memory compartment (usually a panel on the bottom). Remove old modules and insert new ones at an angle then press down to lock. Verify in BIOS/UEFI after boot.",key:["warranty","SO-DIMM","DDR4","DDR3","compatible","battery","angle","BIOS","panel"]},
];

const QUIZ_SIZE = 20;
let usedIndices = [];
let currentQuiz = [];
let answers = [];
let submitted = false;

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startNewQuiz() {
  submitted = false;
  if (usedIndices.length + QUIZ_SIZE > ALL_QUESTIONS.length) {
    usedIndices = [];
  }
  let available = ALL_QUESTIONS.map((_, i) => i).filter(i => !usedIndices.includes(i));
  let shuffled = shuffle(available);
  let chosen = shuffled.slice(0, QUIZ_SIZE);
  usedIndices = usedIndices.concat(chosen);
  currentQuiz = chosen.map(i => ({ ...ALL_QUESTIONS[i] }));
  currentQuiz = shuffle(currentQuiz);
  answers = new Array(QUIZ_SIZE).fill(null);
  renderQuiz();
  window.scrollTo(0, 0);
}

function selectMC(qIdx, optIdx) {
  if (submitted) return;
  answers[qIdx] = optIdx;
  updateAnswerCount();
  let card = document.getElementById('q-' + qIdx);
  card.querySelectorAll('.opt').forEach((el, i) => {
    el.className = 'opt' + (i === optIdx ? ' selected' : '');
  });
  card.classList.add('answered');
}

function updateAnswerCount() {
  let answered = answers.filter((a, i) => {
    if (currentQuiz[i].type === 'mc') return a !== null;
    return a !== null && a !== '';
  }).length;
  document.getElementById('ans-count').textContent = answered;
  document.getElementById('prog-fill').style.width = (answered / QUIZ_SIZE * 100) + '%';
}

function getSAGrade(userAns, q) {
  if (!userAns || userAns.trim().length < 5) return { grade: 'wrong', score: 0 };
  let u = userAns.toLowerCase();
  let matched = q.key.filter(k => u.includes(k.toLowerCase())).length;
  let ratio = matched / q.key.length;
  if (ratio >= 0.55) return { grade: 'correct', score: 1 };
  if (ratio >= 0.25) return { grade: 'partial', score: 0.5 };
  return { grade: 'wrong', score: 0 };
}

function submitQuiz() {
  submitted = true;
  let score = 0;
  currentQuiz.forEach((q, i) => {
    if (q.type === 'mc') {
      if (answers[i] === q.ans) score++;
    } else {
      score += getSAGrade(answers[i] || '', q).score;
    }
  });

  let correct = 0, partial = 0, wrong = 0;
  let reviewHTML = '';
  currentQuiz.forEach((q, i) => {
    if (q.type === 'mc') {
      let isCorrect = answers[i] === q.ans;
      if (isCorrect) correct++; else wrong++;
      let ua = answers[i] !== null ? q.opts[answers[i]] : '(no answer)';
      reviewHTML += `<div class="review-item ${isCorrect ? 'ri-correct' : 'ri-wrong'}">
        <div class="ri-q">${i + 1}. ${q.q}</div>
        <div class="ri-detail">Your answer: <em>${ua}</em></div>
        ${!isCorrect ? `<div class="ri-detail ri-correct-ans">Correct: ${q.opts[q.ans]}</div>` : ''}
        <div class="ri-detail ri-exp">${q.exp}</div>
      </div>`;
    } else {
      let g = getSAGrade(answers[i] || '', q);
      if (g.grade === 'correct') correct++;
      else if (g.grade === 'partial') partial++;
      else wrong++;
      reviewHTML += `<div class="review-item ri-${g.grade}">
        <div class="ri-q">${i + 1}. ${q.q}</div>
        <div class="ri-detail">Your answer: <em>${answers[i] || '(no answer)'}</em></div>
        <div class="ri-detail ri-correct-ans">Model answer: ${q.ans}</div>
      </div>`;
    }
  });

  let pct = Math.round((score / QUIZ_SIZE) * 100);
  let emoji = pct >= 80 ? '🎉' : pct >= 60 ? '📚' : '💪';

  document.getElementById('app').innerHTML = `
    <div class="top-bar">
      <h1>Hardware Final — Results</h1>
      <div class="top-stats">
        <span>Pool: <strong>${usedIndices.length}/${ALL_QUESTIONS.length}</strong> used</span>
      </div>
    </div>
    <div class="container">
      <div class="score-hero">
        <div class="score-pct">${pct}%</div>
        <div class="score-label">${score.toFixed(1)} / ${QUIZ_SIZE} correct ${emoji}</div>
        <div class="score-grid">
          <div class="score-cell"><div class="val val-correct">${correct}</div><div class="lbl">Correct</div></div>
          <div class="score-cell"><div class="val val-partial">${partial}</div><div class="lbl">Partial</div></div>
          <div class="score-cell"><div class="val val-wrong">${wrong}</div><div class="lbl">Wrong</div></div>
        </div>
      </div>
      <div style="text-align:center;margin-bottom:24px;">
        <button class="btn btn-primary" onclick="startNewQuiz()">New Quiz →</button>
      </div>
      <div class="review-section">
        <h3>Answer Review</h3>
        ${reviewHTML}
      </div>
      <div style="text-align:center;margin-top:24px;">
        <button class="btn btn-primary" onclick="startNewQuiz()">New Quiz →</button>
      </div>
    </div>
  `;
  window.scrollTo(0, 0);
}

function renderQuiz() {
  let questionsHTML = currentQuiz.map((q, i) => {
    let bodyHTML = '';
    if (q.type === 'mc') {
      let opts = q.opts.map((o, oi) =>
        `<div class="opt" onclick="selectMC(${i},${oi})"><span class="opt-letter">${'ABCD'[oi]}.</span><span>${o}</span></div>`
      ).join('');
      bodyHTML = `<div class="options">${opts}</div>`;
    } else {
      bodyHTML = `<textarea class="sa-box" id="sa-${i}" placeholder="Write your answer here — try to include key concepts..." oninput="answers[${i}]=this.value;updateAnswerCount()"></textarea>`;
    }
    return `<div class="question-card" id="q-${i}">
      <div class="q-header">
        <span class="q-num">Question ${i + 1} of ${QUIZ_SIZE}</span>
        <span class="q-badge ${q.type === 'mc' ? 'badge-mc' : 'badge-sa'}">${q.type === 'mc' ? 'Multiple Choice' : 'Short Answer'}</span>
      </div>
      <div class="q-text">${q.q}</div>
      ${bodyHTML}
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="top-bar">
      <h1>Hardware Final — Practice Quiz</h1>
      <div class="top-stats">
        <span>Answered: <strong id="ans-count">0</strong>/${QUIZ_SIZE}</span>
        <span>Pool: <strong>${usedIndices.length}/${ALL_QUESTIONS.length}</strong> used</span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="container">
      ${questionsHTML}
    </div>
    <div class="bottom-bar">
      <button class="btn btn-primary" onclick="submitQuiz()">Submit & See Results</button>
      <button class="btn btn-secondary" onclick="startNewQuiz()">Skip → New Quiz</button>
    </div>
  `;
}

startNewQuiz();
</script>
</body>
</html>
